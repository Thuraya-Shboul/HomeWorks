<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            padding: 20px;
        }
        .login-wrapper {
            width: 100%;
            max-width: 950px;
            height: 580px;
            background: url('assets/j_blueberry-hd-wallpaper-7228828_1920.jpg') center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            box-shadow: 0 8px 24px #0003;
        }
        .login-box {
            width: 380px;
            padding: 45px 50px;
            background: #ffffffa6;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px #0002;
        }
        h1 {
            margin-bottom: 35px;
            color: #222;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            border: 0;
            border-radius: 4px;
            outline: none;
            background: #ffffffe0;
        }
        button {
            width: 100%;
            padding: 14px;
            border: 0;
            border-radius: 4px;
            background: #1e5656;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #164040;
        }
        .options {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .options input {
            width: auto;
            padding: 0;
            margin: 0 6px 0 0;
        }
        a {
            color: #3b59ff;
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="login-wrapper">

        <div class="login-box">

            <h1>Account Login</h1>

            <form>

                <input type="text" placeholder="User Name" required>

                <input type="password" placeholder="Password" required>

                <button>LOGIN</button>

                <div class="options">
                    <label>
                        <input type="checkbox"> remember me
                    </label>

                    <a href="#">Forgot Password?</a>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
