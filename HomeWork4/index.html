<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework 4</title>

    <style>
        body {
            margin: 10px;
        }

        .link {
            display: inline-block;
            vertical-align: top;
            margin-right: 40px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: 3px solid green;
            color: black;
            text-decoration: none;
            font-size: 20px;
        }

        .btn:hover {
            background-color: green;
            color: white;
        }

        .btn-hover {
            display: inline-block;
            padding: 10px 20px;
            border: 3px solid green;
            color: white;
            background-color: green;
            text-decoration: none;
            font-size: 20px;
        }

        .btn-hover:hover {
            background-color: white;
            color: black;
        }

        .btn:active,
        .btn-hover:active {
            background-color: #f0f0f0;
        }

        .drinks {
            background: yellow;
            padding-left: 30px;
            width: 80%;
        }

        .drinks ul {
            padding-left: 20px;
            margin: 0;
        }

        .drinks li {
            list-style: square;
            color: black;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .drinks li::marker {
            color: orange;
        }

        .z-box {
            position: relative;
            width: 300px;
            height: 150px;
            margin-top: 20px;
        }

        .background-image {
            position: absolute;
            width: 90px;
            height: 150px;
            background: rgb(248, 181, 57);
            opacity: .8;
            z-index: -1;
        }

        .text h1 {
            margin-top: 0;
            padding-top: 10px;
        }

        .text p {
            white-space: nowrap;
        }
    </style>


</head>

<body>

    <div class="link">
        <h3>Before Hover</h3>
        <a href="#" class="btn">This is a link</a>
    </div>

    <div class="link">
        <h3>After Hover</h3>
        <a href="#" class="btn-hover">This is a link</a>
    </div>

    <br><br><br>

    <div class="drinks">
        <ul>
            <li>Coffee</li>
            <li>Tea</li>
            <li>Coca Cola</li>
        </ul>
    </div>

    <br><br>

    <div class="z-box">
        <div class="background-image"></div>
        <div class="text">
            <h1>This is a heading</h1>
            <p>Because the image has a z-index of -1, it will be placed behind the text.</p>
        </div>
    </div>

</body>

</html>
